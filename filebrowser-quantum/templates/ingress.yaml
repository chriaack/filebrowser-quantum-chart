{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "filebrowser-quantum.fullname" . }}
  labels:
    {{- include "filebrowser-quantum.labels" . | nindent 4 }}
  {{- if or .Values.ingress.ingressClassName .Values.ingress.annotations}}
  annotations:
    {{- if .Values.ingress.ingressClassName }}
    kubernetes.io/ingress.class: {{ .Values.ingress.ingressClassName }}
    {{- end }}
    {{- if .Values.ingress.annotations }}
    {{- toYaml .Values.ingress.annotations | nindent 4 }}
    {{- end }}
  {{- end }}
spec:
  {{- if .Values.ingress.ingressClassName }}
  ingressClassName: {{ .Values.ingress.ingressClassName }}
  {{- end }}
  rules:
    - host: {{ .Values.ingress.host }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "filebrowser-quantum.fullname" . }}
                port:
                  number: {{ .Values.service.port | default 80 }}
{{- if .Values.ingress.tls }}
  tls:
    - hosts:
        - {{ .Values.ingress.host }}
      secretName: {{ .Values.ingress.tlsSecret  | default (printf "%s-tls" .Release.Name) }}
{{- end }}
{{- end }}